spring.application.name=student_management

# PostgreSQL connection (override with environment variables in IntelliJ Run Configuration)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/student_management}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:22510123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate defaults for local development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

# Local filesystem folder for student document uploads
app.upload.dir=uploads
